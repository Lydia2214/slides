<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>桃花源记 · 版本选择</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'PingFang SC','Microsoft YaHei',sans-serif;background:#0a0e1a;color:#e2e8f0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
h1{font-size:22px;font-weight:800;letter-spacing:3px;color:#06b6d4;margin-bottom:6px;text-align:center}
p{font-size:13px;color:#64748b;margin-bottom:40px;text-align:center;letter-spacing:1px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:16px;width:100%;max-width:800px}
.card{background:#111827;border:1px solid rgba(6,182,212,0.2);border-radius:14px;padding:24px 20px;text-decoration:none;color:inherit;transition:all .25s;position:relative;overflow:hidden}
.card:hover{transform:translateY(-4px);border-color:#06b6d4;box-shadow:0 8px 32px rgba(6,182,212,0.2)}
.card-tag{font-size:11px;letter-spacing:2px;font-weight:700;margin-bottom:10px;display:inline-block;padding:2px 10px;border-radius:20px}
.v1 .card-tag{background:rgba(6,182,212,0.12);color:#06b6d4;border:1px solid rgba(6,182,212,0.3)}
.v2 .card-tag{background:rgba(245,158,11,0.12);color:#f59e0b;border:1px solid rgba(245,158,11,0.3)}
.v3 .card-tag{background:rgba(232,160,32,0.12);color:#e8a020;border:1px solid rgba(232,160,32,0.3)}
.card-title{font-size:18px;font-weight:800;margin-bottom:8px}
.card-desc{font-size:12px;color:#64748b;line-height:1.7}
.card-arrow{position:absolute;right:18px;bottom:18px;font-size:18px;opacity:.4;transition:opacity .2s}
.card:hover .card-arrow{opacity:1}
.current{position:absolute;top:12px;right:12px;font-size:10px;background:#06b6d4;color:#0a0e1a;padding:2px 8px;border-radius:10px;font-weight:700}
</style>
</head>
<body>
<h1>桃花源记 · 互动课件</h1>
<p>选择一个版本进入</p>
<div class="grid">
  <a href="v1/" class="card v1">
    <span class="current">当前</span>
    <div class="card-tag">V1 · 原版</div>
    <div class="card-title">时空调查任务</div>
    <div class="card-desc">深蓝底 · 青色荧光<br>终端组件 · 线索解锁</div>
    <div class="card-arrow">→</div>
  </a>
  <a href="v2/" class="card v2">
    <div class="card-tag">V2 · 手绘版</div>
    <div class="card-title">手绘温暖探秘</div>
    <div class="card-desc">米白底 · 手写字体<br>暖色卡片 · 创意动画</div>
    <div class="card-arrow">→</div>
  </a>
  <a href="v3/" class="card v3">
    <div class="card-tag">V3 · 暗黑版</div>
    <div class="card-title">暗黑穿越时空</div>
    <div class="card-desc">纯黑底 · 金色辉光<br>星空粒子 · 玻璃拟态</div>
    <div class="card-arrow">→</div>
  </a>
</div>
</body>
</html>
